<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>筋トレノート</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d24;
    --surface-2: #22262f;
    --line: #2f343f;
    --text: #e8eaed;
    --muted: #9aa0ab;
    --accent: #d6ff3f;
    --accent-dim: #3a4416;
    --danger: #ff6b6b;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 28px; }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  header h1 .mark { color: var(--accent); }
  header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* 入力フォーム */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .head-grid { margin-bottom: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input, select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 11px 12px;
    font-size: 15px;
    font-family: inherit;
    width: 100%;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  input[type="number"] { -moz-appearance: textfield; }
  /* iOS Safari の日付入力がコンテナをはみ出すのを防ぐ */
  input[type="date"] {
    -webkit-appearance: none;
    appearance: none;
    min-width: 0;
    min-height: 44px;
  }

  /* 部位（その日に狙った部位。種目より上位の、日単位の属性） */
  .parts-section { margin-bottom: 18px; }
  .parts-section > label { display: block; margin-bottom: 8px; }
  /* 部位ボックスを縦並びにするコンテナ */
  .parts-list { display: flex; flex-direction: column; gap: 8px; }
  /* 部位1つ分の入力行（テキストボックス＋✕削除ボタン） */
  .part-line { position: relative; }
  .part-line input { padding-right: 36px; }
  .part-del {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    width: 18px;
    height: 18px;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .part-del:hover { color: var(--danger); border-color: var(--danger); }
  .part-del:disabled { opacity: 0; pointer-events: none; }

  /* 部位を追加するボタン（セットを追加と同じ一回り小さい見た目） */
  .add-part {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 8px;
    color: var(--muted);
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
  }
  .add-part:hover { border-color: var(--accent); color: var(--accent); }
  .add-part .plus { color: var(--accent); font-weight: 800; }

  /* 種目の1行 */
  .row {
    position: relative;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    padding-top: 16px;
    margin-bottom: 12px;
  }
  .row-num {
    position: absolute;
    top: -9px;
    left: 12px;
    background: var(--accent);
    color: #14160c;
    font-size: 11px;
    font-weight: 800;
    padding: 1px 9px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .row .ex { margin-bottom: 12px; }

  /* 同じ種目のセット小行をまとめる */
  .set-lines { display: flex; flex-direction: column; gap: 12px; }
  .set-line { position: relative; padding-left: 24px; }
  /* 数値3列（重量/レップ/セット） */
  .set-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  /* 2行目以降はラベルを隠して重複を防ぐ */
  .set-line:not(:first-child) label { display: none; }
  .set-num {
    position: absolute;
    top: 0;
    left: 0;
    width: 18px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    line-height: 34px;
    text-align: center;
  }
  /* セット2行目以降は番号の上下位置を入力欄に合わせる */
  .set-line:not(:first-child) .set-num { line-height: 44px; }
  .set-del {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    width: 18px;
    height: 18px;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .set-del:hover { color: var(--danger); border-color: var(--danger); }
  .set-del:disabled { opacity: 0; pointer-events: none; }

  /* セットを追加するボタン（種目を追加より一回り小さい） */
  .add-set {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 8px;
    color: var(--muted);
    padding: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 12px;
  }
  .add-set:hover { border-color: var(--accent); color: var(--accent); }
  .add-set .plus { color: var(--accent); font-weight: 800; }
  .row-del {
    position: absolute;
    top: -9px;
    right: 10px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    width: 22px;
    height: 22px;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .row-del:hover { color: var(--danger); border-color: var(--danger); }
  .row-del:disabled { opacity: 0; pointer-events: none; }

  /* 種目を追加するボタン */
  .add-row {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 10px;
    color: var(--muted);
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 18px;
  }
  .add-row:hover { border-color: var(--accent); color: var(--accent); }
  .add-row .plus { color: var(--accent); font-weight: 800; }

  button.submit {
    width: 100%;
    background: var(--accent);
    color: #14160c;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  button.submit:active { transform: translateY(1px); }
  button.submit:disabled { opacity: 0.5; cursor: default; }

  .msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .msg.ok { color: var(--accent); }
  .msg.err { color: var(--danger); }

  /* 記録一覧 */
  .list-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .list-head h2 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
  .list-head .count { color: var(--muted); font-size: 13px; }

  /* 記録グループ（同じ日・同じ人） */
  .group {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .group-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--surface-2);
  }
  .group-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .who {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .group-date { font-size: 14px; font-weight: 700; color: var(--text); }
  .group-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* 部位チップを並べる行（名前・日付の下に控えめに表示する） */
  .group-parts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 10px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
  }
  /* 部位チップ。.who（アクセント色）とは別系統の控えめな配色 */
  .part-tag {
    display: inline-block;
    background: var(--surface-2);
    color: var(--muted);
    border: 1px solid var(--line);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .group-body { padding: 4px 16px 8px; }
  .item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .item:last-child { border-bottom: none; }
  .item-ex { font-size: 15px; font-weight: 700; }
  .item-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .item-stats b { color: var(--accent); font-weight: 700; font-size: 14px; }

  /* 種目ごとのブロック（同名種目はまとめて見出し1回） */
  .exercise-block {
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .exercise-block:last-child { border-bottom: none; }
  .exercise-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .set-rows { display: flex; flex-direction: column; gap: 4px; }
  .set-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* 週ナビ */
  .week-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .week-prev, .week-next {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .week-prev:hover, .week-next:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .week-range {
    flex: 1;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .empty, .loading {
    color: var(--muted);
    text-align: center;
    padding: 32px 0;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    /* 種目名はフル幅、数値は3列のまま維持 */
    .set-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>筋トレ<span class="mark">ノート</span></h1>
    <p>書いた内容は全員に見えます。</p>
  </header>

  <!-- 入力フォーム -->
  <div class="card">
    <div class="grid head-grid">
      <div class="field">
        <label for="name">名前</label>
        <select id="name">
          <option value="松嵜">松嵜</option>
          <option value="大森">大森</option>
          <option value="中西先生">中西先生</option>
        </select>
      </div>
      <div class="field">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
    </div>

    <!-- その日に狙った部位（日付＋名前のセッション単位の属性。任意項目） -->
    <div class="parts-section">
      <label>部位</label>
      <!-- 部位の入力ボックスがここに縦に積み上がる -->
      <div class="parts-list" id="parts"></div>
      <button class="add-part" id="addPartBtn" type="button">
        <span class="plus">＋</span> 部位を追加
      </button>
    </div>

    <!-- 種目の行がここに積み上がる -->
    <div id="rows"></div>

    <button class="add-row" id="addRowBtn" type="button">
      <span class="plus">＋</span> 種目を追加
    </button>

    <button class="submit" id="submitBtn">まとめて記録する</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 記録一覧 -->
  <div class="list-head">
    <h2>これまでの記録</h2>
    <span class="count" id="count"></span>
  </div>

  <!-- 週の切り替え -->
  <div class="week-nav">
    <button class="week-prev" id="weekPrevBtn" type="button">‹ 前の週</button>
    <span class="week-range" id="weekRange"></span>
    <button class="week-next" id="weekNextBtn" type="button">次の週 ›</button>
  </div>

  <div id="list">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<script>
  // ▼▼▼ ここだけ自分のものに書き換える ▼▼▼
  // GASをWebアプリとしてデプロイしたときに発行されるURL
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxRhkNvX6u3hQ66zLERBr488Pm__yq-3M3OGEs0sOav4n81PZ-NryuXbeg7-wXAd4NX/exec";
  // ▲▲▲ ここだけ自分のものに書き換える ▲▲▲

  const $ = (id) => document.getElementById(id);

  let rowSeq = 0; // 行の通し番号（DOM識別用）

  let allRecords = [];  // GETで取得した全記録（週切替時に再fetchしないで使い回す）
  let weekOffset = 0;   // 表示中の週のオフセット（0=今週, -1=先週, +1=来週）

  // 種目の行を1つ追加する（種目名は行頭に1回、セット小行は複数持てる）
  function addRow() {
    rowSeq++;
    const id = rowSeq;
    const div = document.createElement("div");
    div.className = "row";
    div.dataset.rowId = id;
    div.innerHTML = `
      <span class="row-num"></span>
      <button type="button" class="row-del" aria-label="この種目を削除">✕</button>
      <div class="field ex">
        <label>種目</label>
        <input type="text" class="in-exercise" placeholder="例: ベンチプレス" autocomplete="off">
      </div>
      <div class="set-lines"></div>
      <button type="button" class="add-set" aria-label="セットを追加">
        <span class="plus">＋</span> 他のセット
      </button>`;
    $("rows").appendChild(div);

    div.querySelector(".row-del").addEventListener("click", function () {
      div.remove();
      renumberRows();
    });

    div.querySelector(".add-set").addEventListener("click", function () {
      addSetLine(div, true);
    });

    // 生成直後に最初のセット小行を1つ用意する（フォーカスはしない）
    addSetLine(div, false);

    renumberRows();
    return div;
  }

  // 種目の行にセット小行を1つ追加する
  // focus が true のとき、追加した小行の重量入力にフォーカスする
  function addSetLine(row, focus) {
    const container = row.querySelector(".set-lines");
    const line = document.createElement("div");
    line.className = "set-line";
    line.innerHTML = `
      <span class="set-num"></span>
      <button type="button" class="set-del" aria-label="このセットを削除">✕</button>
      <div class="set-grid">
        <div class="field">
          <label>重量 (kg)</label>
          <input type="number" class="in-weight" step="0.1" min="0" placeholder="60.0" inputmode="decimal">
        </div>
        <div class="field">
          <label>レップ数</label>
          <input type="number" class="in-reps" step="1" min="0" placeholder="10" inputmode="numeric">
        </div>
        <div class="field">
          <label>セット数</label>
          <input type="number" class="in-sets" step="1" min="0" placeholder="3" inputmode="numeric">
        </div>
      </div>`;
    container.appendChild(line);

    line.querySelector(".set-del").addEventListener("click", function () {
      line.remove();
      renumberSets(row);
    });

    renumberSets(row);

    if (focus) {
      line.querySelector(".in-weight").focus();
    }
    return line;
  }

  // セット番号を振り直し、小行が1つだけのときは削除ボタンを無効化
  function renumberSets(row) {
    const lines = row.querySelectorAll(".set-line");
    lines.forEach(function (line, i) {
      line.querySelector(".set-num").textContent = (i + 1);
      line.querySelector(".set-del").disabled = (lines.length === 1);
    });
  }

  // 行番号を振り直し、行が1つだけのときは削除ボタンを無効化
  function renumberRows() {
    const rows = $("rows").querySelectorAll(".row");
    rows.forEach(function (row, i) {
      row.querySelector(".row-num").textContent = (i + 1);
      row.querySelector(".row-del").disabled = (rows.length === 1);
    });
  }

  // 部位の入力ボックスを1つ追加する（自由記述。空でも提出をブロックしない）
  // focus が true のとき、追加したボックスにフォーカスする
  function addPartLine(focus) {
    const container = $("parts");
    const line = document.createElement("div");
    line.className = "part-line";
    line.innerHTML = `
      <input type="text" class="in-part" placeholder="例: 胸" autocomplete="off">
      <button type="button" class="part-del" aria-label="この部位を削除">✕</button>`;
    container.appendChild(line);

    line.querySelector(".part-del").addEventListener("click", function () {
      line.remove();
      renumberParts();
    });

    renumberParts();

    if (focus) {
      line.querySelector(".in-part").focus();
    }
    return line;
  }

  // 部位ボックスが1つだけのときは削除ボタンを無効化（renumberSets と同じパターン）
  function renumberParts() {
    const lines = $("parts").querySelectorAll(".part-line");
    lines.forEach(function (line) {
      line.querySelector(".part-del").disabled = (lines.length === 1);
    });
  }

  // 部位リストを空ボックス1つに戻す（送信成功後のリセット用）
  function resetParts() {
    $("parts").innerHTML = "";
    addPartLine(false);
  }

  // 日付欄の初期値を今日にする
  function setToday() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    $("date").value = `${y}-${m}-${d}`;
  }

  // メッセージ表示
  function showMsg(text, type) {
    const el = $("msg");
    el.textContent = text;
    el.className = "msg " + (type || "");
  }

  // 一覧を取得して保持し、今表示中の週を描画する
  async function loadRecords() {
    const list = $("list");
    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "取得に失敗しました");

      allRecords = data.records || [];
      renderCurrentWeek();
    } catch (err) {
      list.innerHTML = '<div class="empty">読み込みに失敗しました。<br>' +
        'URLの設定とネットワークを確認してください。</div>';
    }
  }

  // 記録を 日付＋名前 → 種目 → セット配列 の3階層にまとめる
  // recordsは新しい順に並んでいる前提で、出現順をそのまま保持する。
  function groupRecords(records) {
    const groups = [];
    const groupIndex = {};   // "dateLabel|name" → groups内の位置
    records.forEach(function (r) {
      const dateLabel = formatDate(r.date);
      const key = dateLabel + "|" + r.name;
      if (!(key in groupIndex)) {
        groupIndex[key] = groups.length;
        // parts はそのグループで最初に出会ったレコードの parts 文字列を採用する。
        // （top-level ではなくレコード行の parts フィールドを読む。旧記録は undefined）
        groups.push({
          date: dateLabel,
          name: r.name,
          parts: r.parts,
          exercises: [],
          exIndex: {}
        });
      }
      const g = groups[groupIndex[key]];

      // 同じグループ内で同名種目はまとめ、セットだけ積み増す
      const exKey = String(r.exercise);
      if (!(exKey in g.exIndex)) {
        g.exIndex[exKey] = g.exercises.length;
        g.exercises.push({ exercise: r.exercise, sets: [] });
      }
      g.exercises[g.exIndex[exKey]].sets.push(r);
    });

    // allRecords は新しい順。各種目内のセットは入力順（古い→新しい）で
    // 並ぶようにする。グループ（日・人）や種目の並び自体は新しい順のまま変えない。
    groups.forEach(function (g) {
      g.exercises.forEach(function (ex) {
        ex.sets.reverse();
      });
    });
    return groups;
  }

  // 部位チップ行のHTMLを組み立てる。
  // parts 文字列を「、」で split → trim → 空要素除去 してからチップ化する。
  // 部位が無い／空のグループ、parts フィールドを持たない旧記録では何も描画しない。
  function renderParts(parts) {
    if (!parts) return "";
    const list = String(parts)
      .split("、")
      .map(function (p) { return p.trim(); })
      .filter(function (p) { return p !== ""; });
    if (list.length === 0) return "";
    const chips = list.map(function (p) {
      return `<span class="part-tag">${escapeHtml(p)}</span>`;
    }).join("");
    return `<div class="group-parts">${chips}</div>`;
  }

  // 1グループ（同じ日・同じ人）のHTMLを組み立て
  function renderGroup(g) {
    const body = g.exercises.map(renderExerciseBlock).join("");
    return `
      <div class="group">
        <div class="group-head">
          <div class="group-left">
            <span class="who">${escapeHtml(g.name)}</span>
            <span class="group-date">${escapeHtml(g.date)}</span>
          </div>
          <span class="group-count">${g.exercises.length} 種目</span>
        </div>
        ${renderParts(g.parts)}
        <div class="group-body">${body}</div>
      </div>`;
  }

  // 種目1つのブロック（種目名を1回 + セットを並べる）
  function renderExerciseBlock(ex) {
    const rows = ex.sets.map(renderSetRow).join("");
    return `
      <div class="exercise-block">
        <div class="exercise-name">${escapeHtml(ex.exercise)}</div>
        <div class="set-rows">${rows}</div>
      </div>`;
  }

  // 種目内のセット1行
  function renderSetRow(s) {
    // null / undefined / 空文字 はまとめて "-" に（GASがフィールドを省略する場合に備える）
    const weight = (s.weight == null || s.weight === "") ? "-" : s.weight;
    const reps = (s.reps == null || s.reps === "") ? "-" : s.reps;
    const sets = (s.sets == null || s.sets === "") ? "-" : s.sets;
    return `
      <div class="set-row">
        <div class="item-stats">
          <span><b>${escapeHtml(String(weight))}</b> kg</span>
          <span><b>${escapeHtml(String(reps))}</b> レップ</span>
          <span><b>${escapeHtml(String(sets))}</b> セット</span>
        </div>
      </div>`;
  }

  // XSS対策
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // 日付を「YYYY年M月D日」に整える
  // YYYY-MM-DD でも、長い Date 文字列でも受け取れるようにする。
  // タイムゾーンによる日付ズレを避けるため、文字列から直接 年・月・日 を読む。
  function formatDate(value) {
    if (!value) return "";
    const s = String(value);

    // YYYY-MM-DD 形式
    const iso = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (iso) {
      return `${Number(iso[1])}年${Number(iso[2])}月${Number(iso[3])}日`;
    }

    // "Tue Jun 16 2026 ..." のような英語形式を文字列のまま解析
    const months = {
      Jan: 1, Feb: 2, Mar: 3, Apr: 4, May: 5, Jun: 6,
      Jul: 7, Aug: 8, Sep: 9, Oct: 10, Nov: 11, Dec: 12
    };
    const en = s.match(/\b([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})\b/);
    if (en && months[en[1]]) {
      return `${Number(en[3])}年${months[en[1]]}月${Number(en[2])}日`;
    }

    // どうしても解釈できなければそのまま返す
    return s;
  }

  // 日付文字列から年・月・日を数値で取り出す（TZズレを避けるため文字列から直接読む）
  // YYYY-MM-DD でも "Tue Jun 16 2026 ..." でも受け取れる。解釈できなければ null。
  function parseYMD(value) {
    if (!value) return null;
    const s = String(value);

    // YYYY-MM-DD 形式
    const iso = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (iso) {
      return { y: Number(iso[1]), m: Number(iso[2]), d: Number(iso[3]) };
    }

    // "Tue Jun 16 2026 ..." のような英語形式
    const months = {
      Jan: 1, Feb: 2, Mar: 3, Apr: 4, May: 5, Jun: 6,
      Jul: 7, Aug: 8, Sep: 9, Oct: 10, Nov: 11, Dec: 12
    };
    const en = s.match(/\b([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})\b/);
    if (en && months[en[1]]) {
      return { y: Number(en[3]), m: months[en[1]], d: Number(en[2]) };
    }

    return null;
  }

  // 指定日が属する週の月曜0時(UTC)のミリ秒を返す（月曜始まり、UTC基準）
  function mondayOf(y, m, d) {
    const t = Date.UTC(y, m - 1, d);
    const dow = new Date(t).getUTCDay(); // 0=日 … 6=土
    const offset = (dow === 0) ? 6 : dow - 1;
    return t - offset * 86400000;
  }

  // 今表示中の週の月曜0時(UTC)を返す（weekOffset週ぶんずらす）
  function currentWeekMonday() {
    const now = new Date();
    const ymd = {
      y: now.getFullYear(),
      m: now.getMonth() + 1,
      d: now.getDate()
    };
    const monday = mondayOf(ymd.y, ymd.m, ymd.d);
    return monday + weekOffset * 7 * 86400000;
  }

  // 指定週（月曜0時〜次の月曜0時の手前）に入る記録だけを返す
  function recordsInWeek(monday) {
    const end = monday + 7 * 86400000;
    return allRecords.filter(function (r) {
      const ymd = parseYMD(r.date);
      if (!ymd) return false;
      const t = Date.UTC(ymd.y, ymd.m - 1, ymd.d);
      return monday <= t && t < end;
    });
  }

  // 週の範囲を "6/15(月) 〜 6/21(日)" の形式で返す（UTC基準）
  function formatWeekRange(monday) {
    const days = ["日", "月", "火", "水", "木", "金", "土"];
    const sunday = monday + 6 * 86400000;
    const fmt = function (t) {
      const dt = new Date(t);
      const mo = dt.getUTCMonth() + 1;
      const da = dt.getUTCDate();
      const w = days[dt.getUTCDay()];
      return `${mo}/${da}(${w})`;
    };
    return `${fmt(monday)} 〜 ${fmt(sunday)}`;
  }

  // 今表示中の週を描画する（再fetchはしない）
  function renderCurrentWeek() {
    const list = $("list");
    const monday = currentWeekMonday();
    $("weekRange").textContent = formatWeekRange(monday);

    const subset = recordsInWeek(monday);
    $("count").textContent = subset.length + " 件";

    if (subset.length === 0) {
      list.innerHTML = '<div class="empty">この週の記録はありません。</div>';
      return;
    }

    const groups = groupRecords(subset);
    list.innerHTML = groups.map(renderGroup).join("");
  }

  // 入力済みの全行を集める（種目が空の行は丸ごと除外）
  // 1種目に複数セットがあるので、種目×セットの2重ループで1セット=1itemにする
  function collectItems() {
    const items = [];
    $("rows").querySelectorAll(".row").forEach(function (row) {
      const exercise = row.querySelector(".in-exercise").value.trim();
      if (!exercise) return; // 種目名が空の行はスキップ

      row.querySelectorAll(".set-line").forEach(function (line) {
        const weight = line.querySelector(".in-weight").value;
        const reps = line.querySelector(".in-reps").value;
        const sets = line.querySelector(".in-sets").value;
        // 重量・レップ・セットが全部空の小行はスキップ
        if (weight === "" && reps === "" && sets === "") return;
        items.push({
          exercise: exercise,
          weight: weight,
          reps: reps,
          sets: sets
        });
      });
    });
    return items;
  }

  // 入力済みの部位を入力順の配列で集める（trim済みの空でない文字列だけ）
  // 「、」は送信時の連結区切り兼・表示時の分割区切りに使うため、
  // 1ボックス内に入力された「、」は中黒「・」へ正規化し、1ボックス=1チップを保つ。
  function collectParts() {
    const parts = [];
    $("parts").querySelectorAll(".in-part").forEach(function (input) {
      const v = input.value.trim().replace(/、/g, "・");
      if (v) parts.push(v);
    });
    return parts;
  }

  // まとめて送信
  async function submit() {
    const items = collectItems();
    if (items.length === 0) {
      // 種目名は入っているのに数値が空の場合は、その点を案内する
      const hasExercise = Array.from($("rows").querySelectorAll(".in-exercise"))
        .some(function (input) { return input.value.trim() !== ""; });
      if (hasExercise) {
        showMsg("重量・レップ・セットのいずれかを入力してください。", "err");
      } else {
        showMsg("種目を1つ以上入力してください。", "err");
      }
      return;
    }

    // 部位はその日（日付＋名前）単位の属性。配列で集めておく。
    const parts = collectParts();
    // 行ベース保存（1行=1セット）で往復させるため、各itemにも部位を持たせる。
    // 配列を「、」（読点）で連結した文字列にして付与する。
    // ※GAS側で parts 列の保存・返却対応が必要（未対応でも下記は無害）。
    const partsStr = parts.join("、");
    items.forEach(function (item) {
      item.parts = partsStr;
    });

    const payload = {
      name: $("name").value,
      date: $("date").value,
      // top-level parts は後方互換用（配列のまま送る）
      parts: parts,
      items: items
    };

    const btn = $("submitBtn");
    btn.disabled = true;
    showMsg("送信中...", "");

    try {
      // GASのdoPostへ。CORSプリフライトを避けるため text/plain で送る
      await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      showMsg(items.length + " 件を記録しました。", "ok");

      // 行をリセットして1行だけに戻す（名前と日付は残す）
      $("rows").innerHTML = "";
      addRow();
      // 部位も空ボックス1つに戻す（名前と日付は残す）
      resetParts();
      // 送信した日付が属する週を表示して、登録直後の記録が見えるようにする。
      // 今日の週の月曜との差（ミリ秒）を1週間で割って weekOffset を求める。
      const ymd = parseYMD($("date").value);
      if (ymd) {
        const sentMonday = mondayOf(ymd.y, ymd.m, ymd.d);
        const todayMonday = mondayOf(
          new Date().getFullYear(),
          new Date().getMonth() + 1,
          new Date().getDate()
        );
        weekOffset = Math.round((sentMonday - todayMonday) / 604800000);
      } else {
        // 日付が解釈できなければ従来どおり今週へ戻す
        weekOffset = 0;
      }
      await loadRecords();
    } catch (err) {
      showMsg("送信に失敗しました。通信環境を確認してください。", "err");
    } finally {
      btn.disabled = false;
    }
  }

  // 初期化
  setToday();
  addRow(); // 最初の1行
  addPartLine(false); // 部位の空ボックスを1つ用意する
  $("addRowBtn").addEventListener("click", addRow);
  $("addPartBtn").addEventListener("click", function () {
    addPartLine(true);
  });
  $("submitBtn").addEventListener("click", submit);

  // 週の切り替え（再fetchせず手元のallRecordsから描画し直す）
  $("weekPrevBtn").addEventListener("click", function () {
    weekOffset--;
    renderCurrentWeek();
  });
  $("weekNextBtn").addEventListener("click", function () {
    weekOffset++;
    renderCurrentWeek();
  });

  loadRecords();
</script>
</body>
</html>
