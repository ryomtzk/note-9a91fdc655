<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>筋トレノート</title>
<style>
  :root {
    --bg: #0f1115;
    --surface: #1a1d24;
    --surface-2: #22262f;
    --line: #2f343f;
    --text: #e8eaed;
    --muted: #9aa0ab;
    --accent: #d6ff3f;
    --accent-dim: #3a4416;
    --danger: #ff6b6b;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 28px; }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  header h1 .mark { color: var(--accent); }
  header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* 入力フォーム */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .head-grid { margin-bottom: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input, select {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 11px 12px;
    font-size: 15px;
    font-family: inherit;
    width: 100%;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  input[type="number"] { -moz-appearance: textfield; }

  /* 種目の1行 */
  .row {
    position: relative;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    padding-top: 16px;
    margin-bottom: 12px;
  }
  .row-num {
    position: absolute;
    top: -9px;
    left: 12px;
    background: var(--accent);
    color: #14160c;
    font-size: 11px;
    font-weight: 800;
    padding: 1px 9px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .row .ex { grid-column: 1 / -1; }
  .row-del {
    position: absolute;
    top: -9px;
    right: 10px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    width: 22px;
    height: 22px;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .row-del:hover { color: var(--danger); border-color: var(--danger); }
  .row-del:disabled { opacity: 0; pointer-events: none; }

  /* 種目を追加するボタン */
  .add-row {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 10px;
    color: var(--muted);
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 18px;
  }
  .add-row:hover { border-color: var(--accent); color: var(--accent); }
  .add-row .plus { color: var(--accent); font-weight: 800; }

  button.submit {
    width: 100%;
    background: var(--accent);
    color: #14160c;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  button.submit:active { transform: translateY(1px); }
  button.submit:disabled { opacity: 0.5; cursor: default; }

  .msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .msg.ok { color: var(--accent); }
  .msg.err { color: var(--danger); }

  /* 記録一覧 */
  .list-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .list-head h2 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
  .list-head .count { color: var(--muted); font-size: 13px; }

  /* 記録グループ（同じ日・同じ人） */
  .group {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .group-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--surface-2);
  }
  .group-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .who {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .group-date { font-size: 14px; font-weight: 700; color: var(--text); }
  .group-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .group-body { padding: 4px 16px 8px; }
  .item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .item:last-child { border-bottom: none; }
  .item-ex { font-size: 15px; font-weight: 700; }
  .item-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .item-stats b { color: var(--accent); font-weight: 700; font-size: 14px; }

  .empty, .loading {
    color: var(--muted);
    text-align: center;
    padding: 32px 0;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .row-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>筋トレ<span class="mark">ノート</span></h1>
    <p>書いた内容は全員に見えます。</p>
  </header>

  <!-- 入力フォーム -->
  <div class="card">
    <div class="grid head-grid">
      <div class="field">
        <label for="name">名前</label>
        <select id="name">
          <option value="松嵜">松嵜</option>
          <option value="大森">大森</option>
          <option value="中西先生">中西先生</option>
        </select>
      </div>
      <div class="field">
        <label for="date">日付</label>
        <input type="date" id="date">
      </div>
    </div>

    <!-- 種目の行がここに積み上がる -->
    <div id="rows"></div>

    <button class="add-row" id="addRowBtn" type="button">
      <span class="plus">＋</span> 種目を追加
    </button>

    <button class="submit" id="submitBtn">まとめて記録する</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 記録一覧 -->
  <div class="list-head">
    <h2>これまでの記録</h2>
    <span class="count" id="count"></span>
  </div>
  <div id="list">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<script>
  // ▼▼▼ ここだけ自分のものに書き換える ▼▼▼
  // GASをWebアプリとしてデプロイしたときに発行されるURL
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxRhkNvX6u3hQ66zLERBr488Pm__yq-3M3OGEs0sOav4n81PZ-NryuXbeg7-wXAd4NX/exec";
  // ▲▲▲ ここだけ自分のものに書き換える ▲▲▲

  const $ = (id) => document.getElementById(id);

  let rowSeq = 0; // 行の通し番号（DOM識別用）

  // 種目の行を1つ追加する
  function addRow() {
    rowSeq++;
    const id = rowSeq;
    const div = document.createElement("div");
    div.className = "row";
    div.dataset.rowId = id;
    div.innerHTML = `
      <span class="row-num"></span>
      <button type="button" class="row-del" aria-label="この種目を削除">✕</button>
      <div class="row-grid">
        <div class="field ex">
          <label>種目</label>
          <input type="text" class="in-exercise" placeholder="例: ベンチプレス" autocomplete="off">
        </div>
        <div class="field">
          <label>重量 (kg)</label>
          <input type="number" class="in-weight" step="0.1" min="0" placeholder="60.0" inputmode="decimal">
        </div>
        <div class="field">
          <label>レップ数</label>
          <input type="number" class="in-reps" step="1" min="0" placeholder="10" inputmode="numeric">
        </div>
        <div class="field">
          <label>セット数</label>
          <input type="number" class="in-sets" step="1" min="0" placeholder="3" inputmode="numeric">
        </div>
      </div>`;
    $("rows").appendChild(div);

    div.querySelector(".row-del").addEventListener("click", function () {
      div.remove();
      renumberRows();
    });

    renumberRows();
    return div;
  }

  // 行番号を振り直し、行が1つだけのときは削除ボタンを無効化
  function renumberRows() {
    const rows = $("rows").querySelectorAll(".row");
    rows.forEach(function (row, i) {
      row.querySelector(".row-num").textContent = (i + 1);
      row.querySelector(".row-del").disabled = (rows.length === 1);
    });
  }

  // 日付欄の初期値を今日にする
  function setToday() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    $("date").value = `${y}-${m}-${d}`;
  }

  // メッセージ表示
  function showMsg(text, type) {
    const el = $("msg");
    el.textContent = text;
    el.className = "msg " + (type || "");
  }

  // 一覧を取得して描画
  async function loadRecords() {
    const list = $("list");
    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "取得に失敗しました");

      const records = data.records || [];
      $("count").textContent = records.length + " 件";

      if (records.length === 0) {
        list.innerHTML = '<div class="empty">まだ記録がありません。最初の1件を書き込みましょう。</div>';
        return;
      }

      // 日付＋名前ごとにグループ化（recordsは新しい順に並んでいる）
      const groups = [];
      const index = {};
      records.forEach(function (r) {
        const dateLabel = formatDate(r.date);
        const key = dateLabel + "|" + r.name;
        if (!(key in index)) {
          index[key] = groups.length;
          groups.push({ date: dateLabel, name: r.name, items: [] });
        }
        groups[index[key]].items.push(r);
      });

      list.innerHTML = groups.map(renderGroup).join("");
    } catch (err) {
      list.innerHTML = '<div class="empty">読み込みに失敗しました。<br>' +
        'URLの設定とネットワークを確認してください。</div>';
    }
  }

  // 1グループ（同じ日・同じ人）のHTMLを組み立て
  function renderGroup(g) {
    const rows = g.items.map(renderItemRow).join("");
    return `
      <div class="group">
        <div class="group-head">
          <div class="group-left">
            <span class="who">${escapeHtml(g.name)}</span>
            <span class="group-date">${escapeHtml(g.date)}</span>
          </div>
          <span class="group-count">${g.items.length} 種目</span>
        </div>
        <div class="group-body">${rows}</div>
      </div>`;
  }

  // グループ内の種目1行
  function renderItemRow(r) {
    const weight = (r.weight === "" || r.weight === null) ? "-" : r.weight;
    const reps = (r.reps === "" || r.reps === null) ? "-" : r.reps;
    const sets = (r.sets === "" || r.sets === null) ? "-" : r.sets;
    return `
      <div class="item">
        <div class="item-ex">${escapeHtml(r.exercise)}</div>
        <div class="item-stats">
          <span><b>${escapeHtml(String(weight))}</b> kg</span>
          <span><b>${escapeHtml(String(reps))}</b> レップ</span>
          <span><b>${escapeHtml(String(sets))}</b> セット</span>
        </div>
      </div>`;
  }

  // XSS対策
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // 日付を「YYYY年M月D日」に整える
  // YYYY-MM-DD でも、長い Date 文字列でも受け取れるようにする。
  // タイムゾーンによる日付ズレを避けるため、文字列から直接 年・月・日 を読む。
  function formatDate(value) {
    if (!value) return "";
    const s = String(value);

    // YYYY-MM-DD 形式
    const iso = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (iso) {
      return `${Number(iso[1])}年${Number(iso[2])}月${Number(iso[3])}日`;
    }

    // "Tue Jun 16 2026 ..." のような英語形式を文字列のまま解析
    const months = {
      Jan: 1, Feb: 2, Mar: 3, Apr: 4, May: 5, Jun: 6,
      Jul: 7, Aug: 8, Sep: 9, Oct: 10, Nov: 11, Dec: 12
    };
    const en = s.match(/\b([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})\b/);
    if (en && months[en[1]]) {
      return `${Number(en[3])}年${months[en[1]]}月${Number(en[2])}日`;
    }

    // どうしても解釈できなければそのまま返す
    return s;
  }

  // 入力済みの全行を集める（種目が空の行は除外）
  function collectItems() {
    const items = [];
    $("rows").querySelectorAll(".row").forEach(function (row) {
      const exercise = row.querySelector(".in-exercise").value.trim();
      if (!exercise) return;
      items.push({
        exercise: exercise,
        weight: row.querySelector(".in-weight").value,
        reps: row.querySelector(".in-reps").value,
        sets: row.querySelector(".in-sets").value
      });
    });
    return items;
  }

  // まとめて送信
  async function submit() {
    const items = collectItems();
    if (items.length === 0) {
      showMsg("種目を1つ以上入力してください。", "err");
      return;
    }

    const payload = {
      name: $("name").value,
      date: $("date").value,
      items: items
    };

    const btn = $("submitBtn");
    btn.disabled = true;
    showMsg("送信中...", "");

    try {
      // GASのdoPostへ。CORSプリフライトを避けるため text/plain で送る
      await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      showMsg(items.length + " 件を記録しました。", "ok");

      // 行をリセットして1行だけに戻す（名前と日付は残す）
      $("rows").innerHTML = "";
      addRow();
      await loadRecords();
    } catch (err) {
      showMsg("送信に失敗しました。通信環境を確認してください。", "err");
    } finally {
      btn.disabled = false;
    }
  }

  // 初期化
  setToday();
  addRow(); // 最初の1行
  $("addRowBtn").addEventListener("click", addRow);
  $("submitBtn").addEventListener("click", submit);
  loadRecords();
</script>
</body>
</html>
